<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matthew Fitness</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== GENERAL ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Open Sans', sans-serif;
    background: #0d0d0d;
    color: #fff;
    text-align: center;
}

/* ===== HEADER ===== */
header {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
                url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1400&q=80') center/cover no-repeat;
    padding: 100px 20px 80px;
    color: white;
}

header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 64px;
    font-weight: 700;
    color: #f0a500;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 4px 20px rgba(240,165,0,0.4);
}

header p {
    font-size: 18px;
    color: #ccc;
    margin-top: 12px;
    font-weight: 300;
    letter-spacing: 2px;
}

.header-btn {
    display: inline-block;
    margin-top: 28px;
    background: #f0a500;
    color: #0d0d0d;
    padding: 14px 36px;
    border-radius: 30px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    text-decoration: none;
    text-transform: uppercase;
    transition: background 0.3s;
}

.header-btn:hover { background: #ffbe33; }

/* ===== NAV ===== */
nav {
    background: #111;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid #f0a500;
}

nav a {
    color: #ccc;
    text-decoration: none;
    margin: 0 4px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 14px;
    display: inline-block;
    transition: color 0.2s;
}

nav a:hover { color: #f0a500; }

/* ===== SECTIONS ===== */
section {
    padding: 70px 20px;
    max-width: 1000px;
    margin: auto;
}

h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: #f0a500;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    color: #f0a500;
    margin-top: 30px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

p {
    font-size: 15px;
    line-height: 1.9;
    color: #bbb;
}

hr {
    border: none;
    height: 3px;
    background: linear-gradient(90deg, transparent, #f0a500, transparent);
    margin: 0;
}

/* ===== STATS BAR ===== */
.stats-bar {
    background: #f0a500;
    padding: 24px 20px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 40px;
}

.stat {
    text-align: center;
}

.stat h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    color: #0d0d0d;
    margin: 0;
    font-weight: 700;
}

.stat p {
    font-size: 12px;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin: 0;
}

/* ===== LISTS ===== */
ol, ul {
    text-align: left;
    display: inline-block;
    font-size: 15px;
    line-height: 2.2;
    color: #ccc;
    background: #1a1a1a;
    padding: 16px 36px;
    border-radius: 10px;
    border-left: 4px solid #f0a500;
    min-width: 280px;
    margin-top: 12px;
}

ul ul {
    background: none;
    border-left: none;
    box-shadow: none;
    padding-left: 20px;
    font-size: 14px;
    color: #999;
    min-width: unset;
    margin-top: 0;
    line-height: 1.8;
}

/* ===== SERVICES / CARDS ===== */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.card {
